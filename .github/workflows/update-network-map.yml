name: Update Network Map

on:
  push:
    branches:
      - main
    paths:
      - 'XML_XSD_Contract_v2.3_Centralized 1.md'
      - 'scripts/generate_network_map.py'
  workflow_dispatch:

jobs:
  update-map:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Network Map
        run: python scripts/generate_network_map.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-update network map in README.md" && git push)
