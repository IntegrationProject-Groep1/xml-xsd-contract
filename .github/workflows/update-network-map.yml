name: Update Network Map

on:
  push:
    branches:
      - main
    paths:
      - 'XML_XSD_Contract_v2.3_Centralized 1.md'
      - 'scripts/generate_network_map.py'
  workflow_dispatch:

jobs:
  update-map:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Network Map
        run: python scripts/generate_network_map.py

      - name: Create pull request with updated network map
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: auto-update network map in README.md"
          branch: chore/auto-update-network-map
          title: "docs: auto-update network map"
          body: "Automated update of the network map diagram in README.md triggered by a change to the contract or map script."
          labels: documentation
